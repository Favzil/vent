name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Compile firmware
        run: |
          esphome compile vent.yaml || true

      # ★ ПРОСТОЙ ШАГ: ПОКАЗЫВАЕМ ВСЕ ФАЙЛЫ ★
      - name: List all files
        run: |
          echo "=== ВСЕ ФАЙЛЫ В ПРОЕКТЕ ==="
          find . -type f -name "*.bin" -o -name "*.elf" -o -name "*.map" | sort
          
          echo ""
          echo "=== ПОЛНЫЙ СПИСОК ВСЕХ ФАЙЛОВ (первые 100) ==="
          find . -type f | head -100
          
          echo ""
          echo "=== ПРОВЕРКА ПАПКИ .esphome ==="
          ls -la .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/ || echo "Папка не найдена"
          
          echo ""
          echo "=== ПОИСК firmware.bin ==="
          find . -name "firmware.bin" -exec ls -la {} \;
          find . -name "firmware.factory.bin" -exec ls -la {} \;
        shell: bash

      # ★ ЗАГРУЖАЕМ АРТЕФАКТ (ЕСЛИ НАЙДЕТСЯ) ★
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.factory.bin
            .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.bin
            **/firmware.factory.bin
            **/firmware.bin
          if-no-files-found: warn
