name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Compile firmware
        run: |
          esphome compile vent.yaml || true

      # ★ НОВЫЙ ШАГ: НАХОДИМ И КОПИРУЕМ ВСЕ .bin ФАЙЛЫ ★
      - name: Find and copy firmware files
        run: |
          echo "🔍 Поиск всех .bin файлов в папке сборки..."
          find . -name "*.bin" -type f -ls
          
          # Создаем папку для артефактов
          mkdir -p firmware_artifacts
          
          # Копируем ВСЕ найденные .bin файлы в одну папку
          find . -name "*.bin" -type f -exec cp {} firmware_artifacts/ \;
          
          # Переименовываем самый важный файл, если он есть
          if [ -f .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.factory.bin ]; then
            cp .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.factory.bin firmware_artifacts/firmware.factory.bin
            echo "✅ firmware.factory.bin найден!"
          elif [ -f .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.bin ]; then
            cp .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.bin firmware_artifacts/firmware.bin
            echo "✅ firmware.bin найден!"
          else
            echo "⚠️ Ищем firmware.bin в других местах..."
            find . -name "firmware.bin" -exec cp {} firmware_artifacts/firmware.bin \; || true
            find . -name "firmware.factory.bin" -exec cp {} firmware_artifacts/firmware.factory.bin \; || true
          fi
          
          echo "📂 Содержимое папки с артефактами:"
          ls -la firmware_artifacts/
        shell: bash

      # ★ ЗАГРУЖАЕМ ВСЮ ПАПКУ С АРТЕФАКТАМИ ★
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware_artifacts/
          if-no-files-found: warn
