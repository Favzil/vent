name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      # ★ ПРАВИЛЬНОЕ ИМЯ ФАЙЛА ★
      - name: Compile firmware
        run: |
          esphome compile openhasp_pastel.yaml

      - name: List all files
        run: |
          echo "=== ВСЕ .bin ФАЙЛЫ ==="
          find . -name "*.bin" -type f -ls
          
          echo ""
          echo "=== ПАПКА СБОРКИ ==="
          ls -la .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/ || echo "❌ Папка не найдена"
        shell: bash

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.factory.bin
            .esphome/build/openhasp_pastel/.pioenvs/openhasp_pastel/firmware.bin
          if-no-files-found: warn
