name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: ESPHome Builder
        uses: esphome/build-action@v6
        with:
          yaml-file: vent.yaml
