name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Compile firmware
        run: |
          esphome compile esp32-display.yaml || true
          # || true нужен, чтобы игнорировать ошибку с Wi-Fi

      # ★ ДОБАВЛЯЕМ СОХРАНЕНИЕ АРТЕФАКТОВ ★
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            **/firmware.factory.bin
            **/firmware.bin
          if-no-files-found: error
