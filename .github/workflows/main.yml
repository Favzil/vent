name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Compile firmware
        run: |
          esphome compile openhasp_pastel.yaml

      # ★ УНИВЕРСАЛЬНЫЙ ПОИСК .bin ФАЙЛОВ ★
      - name: Find and prepare firmware
        run: |
          echo "🔍 Поиск всех .bin файлов..."
          find . -name "*.bin" -type f -ls
          
          echo ""
          echo "🔍 Поиск firmware.factory.bin..."
          find . -name "firmware.factory.bin" -type f -exec ls -la {} \;
          
          # Копируем ВСЕ найденные .bin файлы в корень
          echo ""
          echo "📂 Копирование всех .bin файлов в корень..."
          find . -name "*.bin" -type f -exec cp {} ./ \; || true
          
          echo ""
          echo "📂 Содержимое корневой папки:"
          ls -la *.bin 2>/dev/null || echo "❌ .bin файлы не найдены"
        shell: bash

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            *.bin
          if-no-files-found: warn
