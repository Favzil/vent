esphome:
  name: vent-display
  friendly_name: Ventilation Display
  
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: octal
  speed: 80MHz

# Wi-Fi отключен для теста
wifi:
  ap:
    ssid: "Vent_Test"
    password: ""

logger:
  level: VERY_VERBOSE

spi:
  clk_pin: GPIO48
  mosi_pin: GPIO47

i2c:
  sda: GPIO19
  scl: GPIO45

# Максимально простая конфигурация дисплея
display:
  - platform: mipi_rgb
    id: my_display
    model: CUSTOM
    dimensions:
      width: 480
      height: 480
    data_rate: 2MHz
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    pclk_frequency: 12MHz
    data_pins:
      red: [GPIO11, GPIO12, GPIO13, GPIO14, GPIO0]
      green: [GPIO8, GPIO20, GPIO3, GPIO46, GPIO9, GPIO10]
      blue: [GPIO4, GPIO5, GPIO6, GPIO7, GPIO15]
    color_order: RGB
    invert_colors: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 50
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 20
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x66, 0x00]
      - [0xC1, 0x08]
      - [0xC2, 0x33, 0x01]
      - [0xCC, 0x3B]
      - [0xB0, 0x00, 0x08, 0x08, 0x08, 0x08, 0x08, 0x08, 0x00, 0x00, 0x06, 0x00, 0x00, 0x08, 0x08, 0x08, 0x08, 0x08, 0x08, 0x00, 0x00, 0x06, 0x00]
      - [0xB1, 0x00, 0x48, 0x28, 0x08, 0x08, 0x28, 0x05, 0x48, 0x00, 0x00, 0x36, 0x36, 0x00, 0x00, 0x48, 0x28, 0x08, 0x08, 0x28, 0x05]
      - [0xB2, 0x00, 0x48, 0x28, 0x08, 0x08, 0x28, 0x05, 0x48, 0x00, 0x00, 0x36, 0x36, 0x00, 0x00, 0x48, 0x28, 0x08, 0x08, 0x28, 0x05]
      - [0xE0, 0x00, 0x0F, 0x1A, 0x1C, 0x0A, 0x0E, 0x0B, 0x0C, 0x07, 0x03, 0x0A, 0x0D, 0x11, 0x14, 0x11]
      - [0xE1, 0x00, 0x0F, 0x1A, 0x1C, 0x0A, 0x0E, 0x0B, 0x0C, 0x07, 0x03, 0x0A, 0x0D, 0x11, 0x14, 0x11]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x12]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]

touchscreen:
  - platform: gt911
    interrupt_pin: GPIO41
    reset_pin: GPIO37

output:
  - platform: ledc
    pin: GPIO38
    id: backlight

light:
  - platform: monochromatic
    output: backlight
    name: "Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

# Простейший тестовый интерфейс LVGL
lvgl:
  displays:
    - my_display
  pages:
    - id: main_page
      bg_color: 0x0000FF  # Синий фон - сразу видно, работает ли дисплей
      bg_opa: 100%
      widgets:
        - label:
            id: test_label
            x: 0
            y: 200
            width: 480
            height: 80
            text: "ДИСПЛЕЙ РАБОТАЕТ!"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: montserrat_28

font:
  - file: "gfonts://Montserrat"
    id: montserrat_28
    size: 28
    bpp: 4
