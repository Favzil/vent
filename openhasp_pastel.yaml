esphome:
  name: esp32-display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Включаем PSRAM
psram:
  mode: octal
  speed: 80MHz

logger:
api:

wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"

# I2C для сенсора
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO38
    address: 0x5D

# SPI для инициализации дисплея
spi:
  - id: display_spi
    clk_pin: GPIO48   # Исправлено согласно документации [citation:10]
    mosi_pin: GPIO47  # Исправлено согласно документации [citation:10]

# Настройка дисплея
display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    rotation: 0
    spi_id: display_spi
    cs_pin: GPIO39    # Добавлен CS пин согласно документации [citation:10]
    data_rate: 2MHz   # Параметр перенесен в блок display [citation:2]

# LVGL — создаём надпись "Привет"
lvgl:
  displays:
    - my_display
  widgets:
    - label:
        align: CENTER
        text: "Привет"
        style:
          text_color: 0xFFFFFF
          text_font: montserrat_40

# Подсветка
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
