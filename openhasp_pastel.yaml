# ESPHome конфигурация для ESP32-4848S040C
# Отображает слово "Привет" по центру экрана

esphome:
  name: esp32-display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf        # обязательно для ST7701S

# Wi-Fi (замени на свои данные)
wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"

# Для отладки
logger:
api:

# Явно объявляем SPI (это было пропущено)
spi:
  - id: main_spi
    clk_pin: GPIO14      # замени на свой SCLK
    mosi_pin: GPIO13     # замени на свой MOSI
    miso_pin: GPIO12     # замени на свой MISO (если не используется, можно оставить)

# Настройка дисплея (ST7701S, 480x480)
display:
  - platform: st7701s
    id: my_display
    spi_id: main_spi     # привязываем к объявленному SPI
    cs_pin: GPIO39       # CS пин (может отличаться)
    dc_pin: GPIO38       # DC пин (обязательно добавь)
    reset_pin: GPIO40    # Reset пин (обязательно добавь)
    data_rate: 2MHz
    spi_mode: MODE3
    color_order: RGB
    invert_colors: False
    dimensions:
      width: 480
      height: 480
    lvgl:
      id: my_lvgl
      on_ready:
        then:
          - lvgl.widget.update: my_label
            text: "Привет"

# LVGL — метка с текстом
lvgl:
  - id: my_lvgl
    widgets:
      - id: my_label
        type: label
        align: CENTER
        text: "Привет"
        style:
          text_color: 0xFFFFFF
          text_font: montserrat_40
