esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

# Реле
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true

# ★ ДИСПЛЕЙ С ПРАВИЛЬНЫМ ПОВОРОТОМ ★
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    rotation: 180          # ИСПРАВЛЯЕМ ПЕРЕВЁРНУТЫЙ ТЕКСТ
    spi_id: lcd_spi
    cs_pin: GPIO39

# ★ LVGL С ЧЁРНЫМ ФОНОМ И БЕЛЫМ ТЕКСТОМ ★
lvgl:
  displays:
    - tft_display
  widgets:
    - label:
        align: CENTER
        text: "Привет"      # МОЖНО ВЕРНУТЬ КИРИЛЛИЦУ
        text_color: 0x000000  # ЧЁРНЫЙ ТЕКСТ НА БЕЛОМ ФОНЕ
        text_font: montserrat_40
