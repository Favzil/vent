# ESPHome конфигурация для ESP32-4848S040C
# с параллельным дисплеем ST7701 через компонент mipi_rgb

esphome:
  name: esp32-display
  comment: "ESP32-4848S040C с дисплеем 4.3 480x480"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# Wi-Fi (замени на свои данные)
wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"

# Включаем отладку
logger:
api:

# I2C для сенсора GT911
i2c:
  - id: bus_i2c
    sda: GPIO8
    scl: GPIO9
    frequency: 400kHz

# Сенсор GT911
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO10
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Экран нажат!"

# ==============================================
# ГЛАВНОЕ ИЗМЕНЕНИЕ: Используем mipi_rgb
# ==============================================
display:
  - platform: mipi_rgb
    id: my_display
    model: ST7701S  # Указываем модель
    data_pins:      # 16-битные пины данных
      - GPIO0
      - GPIO1
      - GPIO2
      - GPIO3
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7
      - GPIO8
      - GPIO9
      - GPIO10
      - GPIO11
      - GPIO12
      - GPIO13
      - GPIO14
      - GPIO15
    hsync_pin: GPIO38  # Горизонтальная синхронизация
    vsync_pin: GPIO39  # Вертикальная синхронизация
    pclk_pin: GPIO41   # Пиксельная синхронизация
    de_pin: GPIO40     # Разрешение данных
    reset_pin: GPIO42  # Сброс дисплея
    rotation: 0
    color_order: RGB
    invert_colors: False
    dimensions:
      width: 480
      height: 480
    pclk_frequency: 16MHz  # Важно: стабильная частота для ST7701 [citation:3]
    lvgl:
      id: my_lvgl
      on_ready:
        then:
          - lvgl.widget.update: my_label
            text: "Привет"

# LVGL — метка с текстом
lvgl:
  - id: my_lvgl
    widgets:
      - id: my_label
        type: label
        align: CENTER
        text: "Привет"
        style:
          text_color: 0xFFFFFF
          text_font: montserrat_40

# Реле (3 штуки)
switch:
  - platform: gpio
    id: relay_1
    name: "Реле 1"
    pin: GPIO16
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_2
    name: "Реле 2"
    pin: GPIO17
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_3
    name: "Реле 3"
    pin: GPIO18
    restore_mode: ALWAYS_OFF
