esphome:
 name: esp32-display
 friendly_name: "4848s040"

esp32:
 variant: esp32s3
 framework:
   type: esp-idf

psram:
 mode: octal
 speed: 80MHz

logger:
 level: DEBUG

# Глобальные переменные
globals:
 - id: uart_buffer
   type: std::string
   restore_value: no
   initial_value: '""'
 - id: selected_mode
   type: std::string
   restore_value: no
   initial_value: '"СТАНДАРТНЫЙ"'
 - id: press_timer
   type: int
   restore_value: no
   initial_value: '0'
 - id: active_mode_id
   type: int
   restore_value: no
   initial_value: '0'
 - id: mode_activated
   type: bool
   restore_value: no
   initial_value: 'false'
 - id: inactivity_timer
   type: int
   restore_value: no
   initial_value: '0'
 - id: screensaver_active
   type: bool
   restore_value: no
   initial_value: 'false'
 - id: wakeup_block
   type: int
   restore_value: no
   initial_value: '0'
 - id: normal_brightness
   type: float
   restore_value: no
   initial_value: '1.0'
 - id: screensaver_brightness
   type: float
   restore_value: no
   initial_value: '0.25'
 - id: current_brightness
   type: float
   restore_value: no
   initial_value: '1.0'

# UART для связи с Arduino
uart:
 id: uart_arduino
 tx_pin: GPIO43
 rx_pin: GPIO44
 baud_rate: 115200
 stop_bits: 1
 data_bits: 8
 parity: NONE

# Интервалы
interval:
 - interval: 1s
   then:
     - lambda: |-
         if (id(wakeup_block) > 0) {
           id(wakeup_block)--;
           ESP_LOGD("screensaver", "Wakeup block: %d", id(wakeup_block));
         }
         
         if (!id(screensaver_active) && id(wakeup_block) == 0) {
           id(inactivity_timer)++;
           ESP_LOGD("screensaver", "Inactivity: %d seconds", id(inactivity_timer));
           
           if (id(inactivity_timer) >= 30) {
             ESP_LOGI("screensaver", "Activating screensaver!");
             id(screensaver_active) = true;
             id(inactivity_timer) = 0;
             lv_obj_t *scr = lv_obj_get_parent(id(screensaver_image));
             if (scr != nullptr) {
               lv_scr_load(scr);
               lv_refr_now(nullptr);
             }
           }
         }
 
 - interval: 100ms
   then:
     - lambda: |-
         if (id(press_timer) > 0) {
           id(press_timer) += 100;
           
           if (id(press_timer) >= 3000 && !id(mode_activated)) {
             id(press_timer) = 0;
             id(mode_activated) = true;
             
             ESP_LOGI("mode", "=== ACTIVATING MODE ===");
             
             lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
             if (main_page == nullptr) {
               main_page = lv_scr_act();
             }
             
             switch(id(active_mode_id)) {
               case 1:
                 id(selected_mode) = "СТАНДАРТНЫЙ";
                 lv_label_set_text(id(mode_display), "СТАНДАРТНЫЙ");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                 id(uart_arduino).write_str("MODE:STANDARD\n");
                 break;
               case 2:
                 id(selected_mode) = "ЭКОНОМИЧНЫЙ";
                 lv_label_set_text(id(mode_display), "ЭКОНОМИЧНЫЙ");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                 id(uart_arduino).write_str("MODE:ECONOM\n");
                 break;
               case 3:
                 id(selected_mode) = "ГОСТЕВОЙ";
                 lv_label_set_text(id(mode_display), "ГОСТЕВОЙ");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                 id(uart_arduino).write_str("MODE:GUEST\n");
                 break;
               case 4:
                 id(selected_mode) = "КОНДИЦИОНЕР";
                 lv_label_set_text(id(mode_display), "КОНДИЦИОНЕР");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                 id(uart_arduino).write_str("MODE:CONDITIONER\n");
                 break;
               case 5:
                 id(selected_mode) = "ВЫСОКИЙ КПД";
                 lv_label_set_text(id(mode_display), "ВЫСОКИЙ КПД");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                 id(uart_arduino).write_str("MODE:HIGH_EFFICIENCY\n");
                 break;
               case 6:
                 id(selected_mode) = "СТОП";
                 lv_label_set_text(id(mode_display), "СТОП");
                 lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0xFF0000), 0);
                 id(uart_arduino).write_str("MODE:STOP\n");
                 break;
             }
             ESP_LOGI("mode", "Activated: %s", id(selected_mode).c_str());
             
             if (main_page != nullptr) {
               lv_scr_load(main_page);
               lv_refr_now(nullptr);
               ESP_LOGI("mode", "Switched to main page");
             } else {
               ESP_LOGE("mode", "main_page is null!");
             }
             
             id(active_mode_id) = 0;
             id(mode_activated) = false;
           }
         }
         
 - interval: 500ms
   then:
     - lambda: |-
         if (id(uart_arduino).available()) {
           while (id(uart_arduino).available()) {
             uint8_t byte;
             if (id(uart_arduino).read_byte(&byte)) {
               id(uart_buffer) += static_cast<char>(byte);
             }
           }
           
           size_t newline_pos = id(uart_buffer).find('\n');
           if (newline_pos != std::string::npos) {
             std::string line = id(uart_buffer).substr(0, newline_pos);
             id(uart_buffer) = id(uart_buffer).substr(newline_pos + 1);
             
             if (!line.empty()) {
               ESP_LOGI("main", "Received: %s", line.c_str());
               line.erase(std::remove(line.begin(), line.end(), '\r'), line.end());
               
               size_t space_pos = line.find(' ');
               if (space_pos != std::string::npos) {
                 std::string date_part = line.substr(0, space_pos);
                 std::string time_part = line.substr(space_pos + 1);
                 
                 lv_label_set_text(id(Date), date_part.c_str());
                 lv_label_set_text(id(time_label), time_part.c_str());
                 lv_label_set_text(id(Date_modes), date_part.c_str());
                 lv_label_set_text(id(time_label_modes), time_part.c_str());
                 lv_label_set_text(id(Date_settings), date_part.c_str());
                 lv_label_set_text(id(time_label_settings), time_part.c_str());
                 lv_label_set_text(id(screensaver_date), date_part.c_str());
                 lv_label_set_text(id(screensaver_time), time_part.c_str());
               }
             }
           }
         }

 # Интервал для плавного затухания подсветки
 - interval: 50ms
   then:
     - lambda: |-
         if (id(screensaver_active)) {
           float target = id(screensaver_brightness);
           float step = 0.01;
           
           if (id(current_brightness) > target) {
             id(current_brightness) -= step;
             if (id(current_brightness) < target) {
               id(current_brightness) = target;
             }
             auto call = id(display_backlight).make_call();
             call.set_brightness(id(current_brightness));
             call.perform();
             ESP_LOGD("brightness", "Fading: %.2f", id(current_brightness));
           }
         } else {
           float target = id(normal_brightness);
           float step = 0.03;
           
           if (id(current_brightness) < target) {
             id(current_brightness) += step;
             if (id(current_brightness) > target) {
               id(current_brightness) = target;
             }
             auto call = id(display_backlight).make_call();
             call.set_brightness(id(current_brightness));
             call.perform();
             ESP_LOGD("brightness", "Waking: %.2f", id(current_brightness));
           }
         }

