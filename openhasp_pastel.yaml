# ESPHome конфигурация для ESP32-4848S040C
esphome:
  name: esp32-4848s040c
  comment: "ESP32-4848S040C 4.0 inch Display"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# Включаем PSRAM (обязательно для mipi_rgb)
psram:
  mode: octal
  speed: 80MHz

# Включаем отладку
logger:
api:

# Настройка Wi-Fi
wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"
  fast_connect: true

# Настройка I2C для сенсора GT911
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

# Сенсор GT911
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO38
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Сенсор нажат!"

# ==========================================
# Настройка дисплея ST7701S через mipi_rgb
# ==========================================
display:
  - platform: mipi_rgb
    id: my_display
    model: ST7701S

    # Пины данных
    data_pins:
      red:   [GPIO11, GPIO12, GPIO13, GPIO14, GPIO0]
      green: [GPIO8, GPIO20, GPIO3, GPIO46, GPIO9, GPIO10]
      blue:  [GPIO4, GPIO5, GPIO6, GPIO7, GPIO15]

    # Сигналы управления
    de_pin: GPIO18
    pclk_pin: GPIO21
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    reset_pin: GPIO39

    # Тайминги для ST7701
    hsync_pulse_width: 8
    hsync_back_porch: 50
    hsync_front_porch: 10
    vsync_pulse_width: 8
    vsync_back_porch: 20
    vsync_front_porch: 10
    pclk_frequency: 16MHz

    rotation: 0
    dimensions:
      width: 480
      height: 480

# ==========================================
# LVGL - упрощенная конфигурация без styles
# ==========================================
lvgl:
  displays:
    - my_display
  on_ready:
    then:
      - lvgl.label.update:
          id: my_label
          text: "Привет"
  widgets:
    - label:
        id: my_label
        align: CENTER
        text: "Привет"
        text_color: 0xFFFFFF
        text_font: montserrat_40

# Подсветка
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
