# Реле
switch:
 - platform: gpio
   name: "Реле 1"
   pin:
     number: GPIO40
     inverted: true
 - platform: gpio
   name: "Реле 2"
   pin:
     number: GPIO2
     inverted: true
 - platform: gpio
   name: "Реле 3"
   pin:
     number: GPIO1
     inverted: true

# Подсветка
output:
 - platform: ledc
   id: backlight_output
   pin: GPIO38
   frequency: 150Hz
   min_power: 0.01
   zero_means_zero: true

light:
 - platform: monochromatic
   name: "Подсветка"
   id: display_backlight
   output: backlight_output
   restore_mode: ALWAYS_ON
   default_transition_length: 0s

# SPI для дисплея
spi:
 - id: lcd_spi
   clk_pin: GPIO48
   mosi_pin: GPIO47

# I2C для тачскрина (GT911)
i2c:
 id: touchscreen_bus
 sda: GPIO19
 scl: GPIO45

# ДИСПЛЕЙ
display:
 - platform: mipi_rgb
   id: tft_display
   model: GUITION-4848S040
   spi_id: lcd_spi
   cs_pin: GPIO39
   invert_colors: False

# СЕНСОР ЭКРАНА (GT911)
touchscreen:
 - platform: gt911
   id: my_touchscreen
   display: tft_display
   i2c_id: touchscreen_bus
   address: 0x5D
   transform:
     mirror_x: true
     mirror_y: true
   on_touch:
     then:
       - lambda: |-
           ESP_LOGI("touch", "Touched at x=%d, y=%d", touch.x, touch.y);
       - if:
           condition:
             lambda: 'return id(screensaver_active);'
           then:
             - lambda: |-
                 ESP_LOGI("touch", "Waking up from screensaver");
                 id(screensaver_active) = false;
                 id(inactivity_timer) = 0;
                 id(wakeup_block) = 5;
                 lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
                 if (main_page != nullptr) {
                   lv_scr_load(main_page);
                   lv_refr_now(nullptr);
                 }
           else:
             - lambda: |-
                 ESP_LOGI("touch", "Resetting inactivity timer");
                 id(inactivity_timer) = 0;
   on_release:
     then:
       - lambda: |-
           ESP_LOGI("touch", "Released");

