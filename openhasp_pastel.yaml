# ESPHome конфигурация для ESP32-4848S040C
# с параллельным дисплеем ST7701 и сенсором GT911

esphome:
  name: esp32-display
  comment: "ESP32-4848S040C с дисплеем 4.3 480x480"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# Wi-Fi (замени на свои данные)
wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"

# Включаем отладку
logger:
api:

# I2C для сенсора GT911 (пины из твоего описания)
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

# Сенсор GT911
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO21
    reset_pin: GPIO22
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Экран нажат!"

# Дисплей ST7701 через параллельный интерфейс
display:
  - platform: ili9xxx
    id: my_display
    model: ST7701
    data_pins:
      - GPIO0
      - GPIO1
      - GPIO2
      - GPIO3
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7
      - GPIO8
      - GPIO9
      - GPIO10
      - GPIO11
      - GPIO12
      - GPIO13
      - GPIO14
      - GPIO15
    cs_pin: GPIO39
    dc_pin: GPIO38
    reset_pin: GPIO40
    wr_pin: GPIO41
    rd_pin: GPIO42
    rotation: 0
    color_order: RGB
    invert_colors: False
    dimensions:
      width: 480
      height: 480
    lvgl:
      id: my_lvgl
      on_ready:
        then:
          - lvgl.widget.update: my_label
            text: "Привет"

# LVGL — метка с текстом
lvgl:
  - id: my_lvgl
    widgets:
      - id: my_label
        type: label
        align: CENTER
        text: "Привет"
        style:
          text_color: 0xFFFFFF
          text_font: montserrat_40

# Реле (3 штуки) - замени GPIO на свои пины
switch:
  - platform: gpio
    id: relay_1
    name: "Реле 1"
    pin: GPIO16
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_2
    name: "Реле 2"
    pin: GPIO17
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_3
    name: "Реле 3"
    pin: GPIO18
    restore_mode: ALWAYS_OFF
