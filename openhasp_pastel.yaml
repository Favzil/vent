esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

# ★ ЛОКАЛЬНЫЙ ШРИФТ С ПОДДЕРЖКОЙ РУССКОГО ЯЗЫКА ★
# 1. Скачайте файл Roboto-Regular.ttf с https://fonts.google.com/specimen/Roboto
# 2. Создайте папку "fonts" рядом с вашим YAML файлом
# 3. Положите скачанный файл в папку "fonts"
font:
  - file: "fonts/Roboto-Regular.ttf"
    id: cyrillic_font_40
    size: 40
    # ★ ВАЖНО: Все символы в ОДНУ СТРОКУ без переносов ★
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~АаБбВвГгДдЕеЁёЖжЗзИиЙйКкЛлМмНнОоПпРрСсТтУуФфХхЦцЧчШшЩщЪъЫыЬьЭэЮюЯя'

# Реле
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true

# ДИСПЛЕЙ
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    spi_id: lcd_spi
    cs_pin: GPIO39
    invert_colors: True

# ★ LVGL С ПОДДЕРЖКОЙ РУССКОГО ТЕКСТА ★
lvgl:
  displays:
    - tft_display
  rotation: 180
  widgets:
    - obj:
        id: background_container
        width: 480
        height: 480
        align: CENTER
        bg_color: 0xFFFF00  # Жёлтый фон (даст голубой из-за инверсии)
        widgets:
          - label:
              align: CENTER
              text: "Привет мир!"  # ★ РУССКИЙ ТЕКСТ ★
              text_color: 0x000000  # Чёрный цвет (из-за инверсии будет белым)
              text_font: cyrillic_font_40  # ★ ИСПОЛЬЗУЕМ ЛОКАЛЬНЫЙ ШРИФТ ★
