esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

# Реле (проверь пины!)
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка (ДОБАВЛЯЕМ ЯВНОЕ ВКЛЮЧЕНИЕ)
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s  # Мгновенное включение

# SPI
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true

# ДИСПЛЕЙ (УПРОЩЁННЫЙ, БЕЗ init_sequence)
display:
  - platform: st7701s
    id: tft_display
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: False
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    pclk_frequency: 12MHz
    pclk_inverted: False
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: False
    data_pins:
      red: [GPIO11, GPIO12, GPIO13, GPIO14, GPIO0]
      green: [GPIO8, GPIO20, GPIO3, GPIO46, GPIO9, GPIO10]
      blue: [GPIO4, GPIO5, GPIO6, GPIO7, GPIO15]

# Сенсор (ОТКЛЮЧАЕМ ДЛЯ ТЕСТА)
# touchscreen:
#   - platform: gt911
#     id: tft_touch
#     display: tft_display

# LVGL (ПРОСТЕЙШИЙ ТЕКСТ)
lvgl:
  displays:
    - tft_display
  widgets:
    - label:
        align: CENTER
        text: "Hello"
        text_color: 0xFFFFFF
        text_font: montserrat_40
