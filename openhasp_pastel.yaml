# Реле
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true

# ДИСПЛЕЙ
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    spi_id: lcd_spi
    cs_pin: GPIO39
    invert_colors: True

