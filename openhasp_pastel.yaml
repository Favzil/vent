esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

# –У–ї–Њ–±–∞–ї—М–љ—Л–µ –њ–µ—А–µ–Љ–µ–љ–љ—Л–µ
globals:
  - id: uart_buffer
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: selected_mode
    type: std::string
    restore_value: no
    initial_value: '"–°–Ґ–Р–Э–Ф–Р–†–Ґ–Э–Ђ–Щ"'
  - id: press_timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: active_mode_id
    type: int
    restore_value: no
    initial_value: '0'
  - id: mode_activated
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: idle_timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: is_sleeping
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: previous_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: sleep_page_obj
    type: lv_obj_t*
    restore_value: no
    initial_value: 'nullptr'
  - id: main_page_obj
    type: lv_obj_t*
    restore_value: no
    initial_value: 'nullptr'
  - id: modes_page_obj
    type: lv_obj_t*
    restore_value: no
    initial_value: 'nullptr'
  - id: startup_done
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: touch_counter
    type: int
    restore_value: no
    initial_value: '0'

# UART –і–ї—П —Б–≤—П–Ј–Є —Б Arduino
uart:
  id: uart_arduino
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE

# –Ш–љ—В–µ—А–≤–∞–ї—Л
interval:
  - interval: 100ms
    then:
      - lambda: |-
          // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–∞—Ж–Є—П –њ—А–Є —Б—В–∞—А—В–µ
          if (!id(startup_done)) {
            if (id(main_page_obj) != nullptr) {
              lv_scr_load(id(main_page_obj));
              id(is_sleeping) = false;
              id(idle_timer) = 0;
            }
            id(startup_done) = true;
            ESP_LOGI("init", "Startup complete");
            return;
          }
          
          // –Ґ–∞–є–Љ–µ—А –±–µ–Ј–і–µ–є—Б—В–≤–Є—П
          if (!id(is_sleeping)) {
            id(idle_timer) += 100;
            
            if (id(idle_timer) >= 60000) {
              id(is_sleeping) = true;
              id(idle_timer) = 0;
              
              lv_obj_t *current_scr = lv_scr_act();
              if (current_scr == id(main_page_obj)) {
                id(previous_page) = 0;
              } else if (current_scr == id(modes_page_obj)) {
                id(previous_page) = 1;
              }
              
              if (id(sleep_page_obj) != nullptr) {
                lv_scr_load_anim(id(sleep_page_obj), LV_SCR_LOAD_ANIM_FADE_IN, 300, 0, false);
                ESP_LOGI("sleep", "Entering sleep mode, sleep_page_obj: %p", id(sleep_page_obj));
              } else {
                ESP_LOGE("sleep", "sleep_page_obj is null!");
              }
            }
          }
          
          // –Ю–±—А–∞–±–Њ—В–Ї–∞ –љ–∞–ґ–∞—В–Є—П –і–ї—П —А–µ–ґ–Є–Љ–Њ–≤
          if (id(press_timer) > 0) {
            id(press_timer) += 100;
            
            if (id(press_timer) >= 3000 && !id(mode_activated)) {
              id(press_timer) = 0;
              id(mode_activated) = true;
              
              ESP_LOGI("mode", "=== ACTIVATING MODE ===");
              
              lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
              if (main_page == nullptr) {
                main_page = lv_scr_act();
              }
              
              switch(id(active_mode_id)) {
                case 1:
                  id(selected_mode) = "–°–Ґ–Р–Э–Ф–Р–†–Ґ–Э–Ђ–Щ";
                  lv_label_set_text(id(mode_display), "–°–Ґ–Р–Э–Ф–Р–†–Ґ–Э–Ђ–Щ");
                  id(uart_arduino).write_str("MODE:STANDARD\n");
                  break;
                case 2:
                  id(selected_mode) = "–≠–Ъ–Ю–Э–Ю–Ь–Ш–І–Э–Ђ–Щ";
                  lv_label_set_text(id(mode_display), "–≠–Ъ–Ю–Э–Ю–Ь–Ш–І–Э–Ђ–Щ");
                  id(uart_arduino).write_str("MODE:ECONOM\n");
                  break;
                case 3:
                  id(selected_mode) = "–У–Ю–°–Ґ–Х–Т–Ю–Щ";
                  lv_label_set_text(id(mode_display), "–У–Ю–°–Ґ–Х–Т–Ю–Щ");
                  id(uart_arduino).write_str("MODE:GUEST\n");
                  break;
                case 4:
                  id(selected_mode) = "–Ъ–Ю–Э–Ф–Ш–¶–Ш–Ю–Э–Х–†";
                  lv_label_set_text(id(mode_display), "–Ъ–Ю–Э–Ф–Ш–¶–Ш–Ю–Э–Х–†");
                  id(uart_arduino).write_str("MODE:CONDITIONER\n");
                  break;
                case 5:
                  id(selected_mode) = "–Т–Ђ–°–Ю–Ъ–Ш–Щ –Ъ–Я–Ф";
                  lv_label_set_text(id(mode_display), "–Т–Ђ–°–Ю–Ъ–Ш–Щ –Ъ–Я–Ф");
                  id(uart_arduino).write_str("MODE:HIGH_EFFICIENCY\n");
                  break;
              }
              ESP_LOGI("mode", "Activated: %s", id(selected_mode).c_str());
              
              if (main_page != nullptr) {
                lv_scr_load_anim(main_page, LV_SCR_LOAD_ANIM_FADE_IN, 300, 0, false);
                ESP_LOGI("mode", "Switched to main page");
              }
              
              id(active_mode_id) = 0;
              id(mode_activated) = false;
            }
          }
          
  - interval: 500ms
    then:
      - lambda: |-
          if (id(uart_arduino).available()) {
            while (id(uart_arduino).available()) {
              uint8_t byte;
              if (id(uart_arduino).read_byte(&byte)) {
                id(uart_buffer) += static_cast<char>(byte);
              }
            }
            
            size_t newline_pos = id(uart_buffer).find('\n');
            if (newline_pos != std::string::npos) {
              std::string line = id(uart_buffer).substr(0, newline_pos);
              id(uart_buffer) = id(uart_buffer).substr(newline_pos + 1);
              
              if (!line.empty()) {
                ESP_LOGI("main", "Received: %s", line.c_str());
                line.erase(std::remove(line.begin(), line.end(), '\r'), line.end());
                
                size_t space_pos = line.find(' ');
                if (space_pos != std::string::npos) {
                  std::string date_part = line.substr(0, space_pos);
                  std::string time_part = line.substr(space_pos + 1);
                  
                  lv_label_set_text(id(Date), date_part.c_str());
                  lv_label_set_text(id(time_label), time_part.c_str());
                  lv_label_set_text(id(Date_modes), date_part.c_str());
                  lv_label_set_text(id(time_label_modes), time_part.c_str());
                  lv_label_set_text(id(sleep_time), time_part.c_str());
                  lv_label_set_text(id(sleep_date), date_part.c_str());
                }
              }
            }
          }

