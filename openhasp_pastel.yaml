esphome:
  name: esp32-display
  comment: "ESP32-4848S040C 4.0 inch Display"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Включаем PSRAM (обязательно для mipi_rgb)
psram:
  mode: octal
  speed: 80MHz

logger:
api:

wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"
  fast_connect: true

# I2C для сенсора GT911
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

# Сенсор GT911
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO38
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Сенсор нажат!"

# SPI для инициализации дисплея
spi:
  - id: display_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# Настройка дисплея
display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    rotation: 0
    spi_id: display_spi
    cs_pin: GPIO39
    data_rate: 2MHz

# LVGL - без стилей (стандартная тема)
lvgl:
  displays:
    - my_display
  widgets:
    - label:
        id: my_label
        align: CENTER
        text: "Привет"

# Подсветка
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
