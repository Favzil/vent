esphome:
  name: esp32-display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf  # Обязательно для этого дисплея

# Включаем PSRAM — обязательно для работы с экраном
psram:
  mode: octal
  speed: 80MHz

logger:
api:

wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"

# Настройка сенсорного экрана (I2C)
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO20
    frequency: 400kHz

touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO38
    address: 0x5D

# ★ САМОЕ ГЛАВНОЕ: настройка дисплея
display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040  # <-- Это ключевая строка!
    rotation: 0

# LVGL — создаём надпись "Привет"
lvgl:
  displays:
    - my_display
  widgets:
    - label:
        align: CENTER
        text: "Привет"

# Включаем подсветку
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
