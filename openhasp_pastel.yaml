esphome:
  name: esp32-display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
api:

wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"
  fast_connect: true

# I2C для сенсора (SCL на GPIO45)
i2c:
  - id: bus_i2c
    sda: GPIO19
    scl: GPIO45
    frequency: 400kHz

# Сенсор: interrupt_pin на GPIO40 (НЕ НА GPIO21!)
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO40
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Сенсор нажат!"

# SPI для инициализации дисплея
spi:
  - id: display_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    rotation: 0
    spi_id: display_spi
    cs_pin: GPIO39

lvgl:
  displays:
    - my_display
  widgets:
    - label:
        align: CENTER
        text: "Привет"

# Подсветка: GPIO38
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
