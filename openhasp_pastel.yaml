esphome:
  name: esp32-display
  friendly_name: "4848s040"
  comment: "Optimized version"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_SPIRAM_USE_CAPS_ALLOC: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: 10
      CONFIG_ESP_TASK_WDT_PANIC: n
      CONFIG_ESP_TASK_WDT: n
      CONFIG_ESP_INT_WDT: n
      CONFIG_ESP_IPC_USES_CALLERS_PCONTEXT: n
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: 8192
      CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT: y
      CONFIG_ESP_SYSTEM_PANIC_SILENT_REBOOT: n
      CONFIG_ESP_SYSTEM_EVENT_QUEUE_SIZE: 32
      CONFIG_LWIP_TCPIP_CORE_LOCKING: n
      CONFIG_LWIP_TCPIP_TASK_STACK_SIZE: 2048
      CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN: 16384
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: n
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_FULL: n
      CONFIG_ESP_TLS_INSECURE: y
      CONFIG_ESP_TLS_SKIP_SESSION_CACHE: y
      CONFIG_ESP_TLS_SKIP_VERIFY: y
      CONFIG_ESP_TLS_USE_SECURE_ELEMENT: n
      CONFIG_ESP_TLS_USE_DS_PERIPHERAL: n

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 0

# Р“Р»РҫРұР°Р»СҢРҪСӢРө РҝРөСҖРөРјРөРҪРҪСӢРө
globals:
  - id: uart_buffer
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: selected_mode
    type: std::string
    restore_value: no
    initial_value: '"РЎРўРҗРқР”РҗР РўРқР«Рҷ"'
  - id: press_timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: active_mode_id
    type: int
    restore_value: no
    initial_value: '0'
  - id: mode_activated
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: inactivity_timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: screensaver_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: wakeup_block
    type: int
    restore_value: no
    initial_value: '0'
  - id: normal_brightness
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: screensaver_brightness
    type: float
    restore_value: no
    initial_value: '0.25'
  - id: current_brightness
    type: float
    restore_value: no
    initial_value: '1.0'

# UART РҙР»СҸ СҒРІСҸР·Рё СҒ Arduino
uart:
  id: uart_arduino
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE

# РҳРҪСӮРөСҖРІР°Р»СӢ
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(wakeup_block) > 0) {
            id(wakeup_block)--;
          }
          
          if (!id(screensaver_active) && id(wakeup_block) == 0) {
            id(inactivity_timer)++;
            
            if (id(inactivity_timer) >= 30) {
              id(screensaver_active) = true;
              id(inactivity_timer) = 0;
              lv_obj_t *scr = lv_obj_get_parent(id(screensaver_image));
              if (scr != nullptr) {
                lv_scr_load(scr);
                lv_refr_now(nullptr);
              }
            }
          }
  
  - interval: 100ms
    then:
      - lambda: |-
          if (id(press_timer) > 0) {
            id(press_timer) += 100;
            
            if (id(press_timer) >= 3000 && !id(mode_activated)) {
              id(press_timer) = 0;
              id(mode_activated) = true;
              
              lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
              if (main_page == nullptr) {
                main_page = lv_scr_act();
              }
              
              switch(id(active_mode_id)) {
                case 1:
                  id(selected_mode) = "РЎРўРҗРқР”РҗР РўРқР«Рҷ";
                  lv_label_set_text(id(mode_display), "РЎРўРҗРқР”РҗР РўРқР«Рҷ");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                  id(uart_arduino).write_str("MODE:STANDARD\n");
                  break;
                case 2:
                  id(selected_mode) = "РӯРҡРһРқРһРңРҳР§РқР«Рҷ";
                  lv_label_set_text(id(mode_display), "РӯРҡРһРқРһРңРҳР§РқР«Рҷ");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                  id(uart_arduino).write_str("MODE:ECONOM\n");
                  break;
                case 3:
                  id(selected_mode) = "Р“РһРЎРўР•Р’РһРҷ";
                  lv_label_set_text(id(mode_display), "Р“РһРЎРўР•Р’РһРҷ");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                  id(uart_arduino).write_str("MODE:GUEST\n");
                  break;
                case 4:
                  id(selected_mode) = "РҡРһРқР”РҳРҰРҳРһРқР•Р ";
                  lv_label_set_text(id(mode_display), "РҡРһРқР”РҳРҰРҳРһРқР•Р ");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                  id(uart_arduino).write_str("MODE:CONDITIONER\n");
                  break;
                case 5:
                  id(selected_mode) = "Р’Р«РЎРһРҡРҳРҷ РҡРҹР”";
                  lv_label_set_text(id(mode_display), "Р’Р«РЎРһРҡРҳРҷ РҡРҹР”");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0x0F0F33), 0);
                  id(uart_arduino).write_str("MODE:HIGH_EFFICIENCY\n");
                  break;
                case 6:
                  id(selected_mode) = "РЎРўРһРҹ";
                  lv_label_set_text(id(mode_display), "РЎРўРһРҹ");
                  lv_obj_set_style_text_color(id(mode_display), lv_color_hex(0xFF0000), 0);
                  id(uart_arduino).write_str("MODE:STOP\n");
                  break;
              }
              
              if (main_page != nullptr) {
                lv_scr_load(main_page);
                lv_refr_now(nullptr);
              }
              
              id(active_mode_id) = 0;
              id(mode_activated) = false;
            }
          }
          
  - interval: 500ms
    then:
      - lambda: |-
          if (id(uart_arduino).available()) {
            while (id(uart_arduino).available()) {
              uint8_t byte;
              if (id(uart_arduino).read_byte(&byte)) {
                id(uart_buffer) += static_cast<char>(byte);
              }
            }
            
            size_t newline_pos = id(uart_buffer).find('\n');
            if (newline_pos != std::string::npos) {
              std::string line = id(uart_buffer).substr(0, newline_pos);
              id(uart_buffer) = id(uart_buffer).substr(newline_pos + 1);
              
              if (!line.empty()) {
                line.erase(std::remove(line.begin(), line.end(), '\r'), line.end());
                
                size_t space_pos = line.find(' ');
                if (space_pos != std::string::npos) {
                  std::string date_part = line.substr(0, space_pos);
                  std::string time_part = line.substr(space_pos + 1);
                  
                  lv_label_set_text(id(Date), date_part.c_str());
                  lv_label_set_text(id(time_label), time_part.c_str());
                  lv_label_set_text(id(Date_modes), date_part.c_str());
                  lv_label_set_text(id(time_label_modes), time_part.c_str());
                  lv_label_set_text(id(Date_settings), date_part.c_str());
                  lv_label_set_text(id(time_label_settings), time_part.c_str());
                  lv_label_set_text(id(screensaver_date), date_part.c_str());
                  lv_label_set_text(id(screensaver_time), time_part.c_str());
                }
              }
            }
          }

  - interval: 50ms
    then:
      - lambda: |-
          if (id(screensaver_active)) {
            float target = id(screensaver_brightness);
            float step = 0.01;
            
            if (id(current_brightness) > target) {
              id(current_brightness) -= step;
              if (id(current_brightness) < target) {
                id(current_brightness) = target;
              }
              auto call = id(display_backlight).make_call();
              call.set_brightness(id(current_brightness));
              call.perform();
            }
          } else {
            float target = id(normal_brightness);
            float step = 0.03;
            
            if (id(current_brightness) < target) {
              id(current_brightness) += step;
              if (id(current_brightness) > target) {
                id(current_brightness) = target;
              }
              auto call = id(display_backlight).make_call();
              call.set_brightness(id(current_brightness));
              call.perform();
            }
          }

