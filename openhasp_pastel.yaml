# ESPHome конфигурация для ESP32-4848S040C
esphome:
  name: esp32-4848s040c
  comment: "ESP32-4848S040C 4.0 inch Display"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# Включаем отладку, чтобы видеть сообщения
logger:
api:

# Настройка Wi-Fi
wifi:
  ssid: "ваш_wi-fi"
  password: "ваш_пароль"
  fast_connect: true

# Настройка I2C для сенсора GT911
i2c:
  - id: bus_i2c
    sda: GPIO19  # SDA для сенсора
    scl: GPIO20  # SCL для сенсора
    frequency: 400kHz

# Сенсор GT911
touchscreen:
  - platform: gt911
    id: my_touch
    i2c_id: bus_i2c
    interrupt_pin: GPIO38
    address: 0x5D
    on_touch:
      then:
        - logger.log: "Сенсор нажат!"

# ==========================================
# ГЛАВНОЕ: Настройка дисплея ST7701S
# Используем компонент mipi_rgb
# ==========================================
display:
  - platform: mipi_rgb
    id: my_display
    model: ST7701S  # Модель драйвера
    
    # Пины данных в порядке: R0-R4, G0-G5, B0-B4 (всего 16 бит)
    data_pins:
      red:   [GPIO11, GPIO12, GPIO13, GPIO14, GPIO0]   # R0-R4
      green: [GPIO8, GPIO20, GPIO3, GPIO46, GPIO9, GPIO10]  # G0-G5
      blue:  [GPIO4, GPIO5, GPIO6, GPIO7, GPIO15]      # B0-B4
    
    # Сигналы управления дисплеем
    de_pin: GPIO18      # Data Enable
    pclk_pin: GPIO21    # Pixel Clock
    hsync_pin: GPIO16   # Horizontal Sync
    vsync_pin: GPIO17   # Vertical Sync
    reset_pin: GPIO39   # Сброс дисплея
    
    # Тайминги для ST7701
    hsync_pulse_width: 8
    hsync_back_porch: 50
    hsync_front_porch: 10
    vsync_pulse_width: 8
    vsync_back_porch: 20
    vsync_front_porch: 10
    pclk_frequency: 16MHz
    
    rotation: 0
    dimensions:
      width: 480
      height: 480
    
    # LVGL для отображения
    lvgl:
      id: my_lvgl
      on_ready:
        then:
          - lvgl.widget.update: my_label
            text: "Привет"

# Создаем надпись "Привет"
lvgl:
  - id: my_lvgl
    widgets:
      - id: my_label
        type: label
        align: CENTER
        text: "Привет"
        style:
          text_color: 0xFFFFFF
          text_font: montserrat_40

# Кнопка для управления подсветкой (GPIO38)
switch:
  - platform: gpio
    id: backlight
    name: "Подсветка"
    pin: GPIO38
    restore_mode: ALWAYS_ON
