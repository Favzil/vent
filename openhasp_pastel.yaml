esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

# Глобальная переменная для хранения буфера
globals:
  - id: uart_buffer
    type: std::string
    restore_value: no
    initial_value: '""'

# UART для связи с Arduino
uart:
  id: uart_arduino
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE

# Интервал для чтения данных из UART
interval:
  - interval: 500ms
    then:
      - lambda: |-
          // Проверяем, есть ли данные в буфере UART
          if (id(uart_arduino).available()) {
            // Читаем данные по одному байту
            while (id(uart_arduino).available()) {
              uint8_t byte;
              if (id(uart_arduino).read_byte(&byte)) {
                id(uart_buffer) += static_cast<char>(byte);
              }
            }
            
            // Проверяем, есть ли символ новой строки
            size_t newline_pos = id(uart_buffer).find('\n');
            if (newline_pos != std::string::npos) {
              // Извлекаем строку до \n
              std::string line = id(uart_buffer).substr(0, newline_pos);
              // Удаляем обработанную часть из буфера
              id(uart_buffer) = id(uart_buffer).substr(newline_pos + 1);
              
              if (!line.empty()) {
                ESP_LOGI("main", "Received: %s", line.c_str());
                
                // Удаляем символ возврата каретки
                line.erase(std::remove(line.begin(), line.end(), '\r'), line.end());
                
                // Ожидаем формат: "Сб 20-июнь-2026 14:32"
                size_t space_pos = line.find(' ');
                if (space_pos != std::string::npos) {
                  std::string date_part = line.substr(0, space_pos);
                  std::string time_part = line.substr(space_pos + 1);
                  
                  // Обновляем тексты на дисплее через LVGL API
                  lv_label_set_text(id(Date), date_part.c_str());
                  lv_label_set_text(id(time_label), time_part.c_str());
                }
              }
            }
          }

