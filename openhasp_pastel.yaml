# –†–µ–ї–µ
switch:
  - platform: gpio
    name: "–†–µ–ї–µ 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "–†–µ–ї–µ 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "–†–µ–ї–µ 3"
    pin:
      number: GPIO1
      inverted: true

# –Я–Њ–і—Б–≤–µ—В–Ї–∞
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "–Я–Њ–і—Б–≤–µ—В–Ї–∞"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI –і–ї—П –і–Є—Б–њ–ї–µ—П
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C –і–ї—П —В–∞—З—Б–Ї—А–Є–љ–∞ (GT911)
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl: GPIO45

# –Ф–Ш–°–Я–Ы–Х–Щ
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    spi_id: lcd_spi
    cs_pin: GPIO39
    invert_colors: False

# ============================================
# –°–Х–Э–°–Ю–† –≠–Ъ–†–Р–Э–Р (GT911)
# ============================================
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: tft_display
    i2c_id: touchscreen_bus
    address: 0x5D
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - lambda: |-
            id(touch_counter)++;
            ESP_LOGI("touch", "TOUCH #%d at x=%d, y=%d, is_sleeping=%s", 
                     id(touch_counter), touch.x, touch.y, 
                     id(is_sleeping) ? "true" : "false");
            
            // –Х—Б–ї–Є –≤ —А–µ–ґ–Є–Љ–µ —Б–љ–∞ - –≤—Л—Е–Њ–і–Є–Љ –Є–Ј —Б–љ–∞
            if (id(is_sleeping)) {
              ESP_LOGI("sleep", "EXITING SLEEP MODE VIA TOUCH!");
              id(is_sleeping) = false;
              id(idle_timer) = 0;
              
              // –Я–Њ–Ї–∞–Ј—Л–≤–∞–µ–Љ –њ—А–µ–і—Л–і—Г—Й—Г—О —Б—В—А–∞–љ–Є—Ж—Г
              if (id(previous_page) == 0 && id(main_page_obj) != nullptr) {
                lv_scr_load_anim(id(main_page_obj), LV_SCR_LOAD_ANIM_FADE_IN, 300, 0, false);
                ESP_LOGI("sleep", "Loaded main page");
              } else if (id(previous_page) == 1 && id(modes_page_obj) != nullptr) {
                lv_scr_load_anim(id(modes_page_obj), LV_SCR_LOAD_ANIM_FADE_IN, 300, 0, false);
                ESP_LOGI("sleep", "Loaded modes page");
              } else {
                ESP_LOGE("sleep", "No page to load!");
              }
            } else {
              // –°–±—А–∞—Б—Л–≤–∞–µ–Љ —В–∞–є–Љ–µ—А –±–µ–Ј–і–µ–є—Б—В–≤–Є—П –њ—А–Є –Ї–∞—Б–∞–љ–Є–Є
              id(idle_timer) = 0;
              ESP_LOGI("touch", "Reset idle timer");
            }
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("touch", "Released at x=%d, y=%d", touch.x, touch.y);

# вШЕ LVGL –° –Ъ–†–Р–°–Ш–Т–Ђ–Ь –Ю–§–Ю–†–Ь–Ы–Х–Э–Ш–Х–Ь вШЕ
