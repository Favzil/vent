esphome:
  name: esp32-display
  friendly_name: "4848s040"

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

# Глобальные переменные
globals:
  - id: uart_buffer
    type: std::string
    restore_value: no
    initial_value: '""'

# UART для связи с Arduino
uart:
  id: uart_arduino
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE

# Интервал для чтения данных из UART
interval:
  - interval: 500ms
    then:
      - lambda: |-
          // Проверяем, есть ли данные в буфере UART
          if (id(uart_arduino).available()) {
            // Читаем данные по одному байту
            while (id(uart_arduino).available()) {
              uint8_t byte;
              if (id(uart_arduino).read_byte(&byte)) {
                id(uart_buffer) += static_cast<char>(byte);
              }
            }
            
            // Проверяем, есть ли символ новой строки
            size_t newline_pos = id(uart_buffer).find('\n');
            if (newline_pos != std::string::npos) {
              // Извлекаем строку до \n
              std::string line = id(uart_buffer).substr(0, newline_pos);
              // Удаляем обработанную часть из буфера
              id(uart_buffer) = id(uart_buffer).substr(newline_pos + 1);
              
              if (!line.empty()) {
                ESP_LOGI("main", "Received: %s", line.c_str());
                
                // Удаляем символ возврата каретки
                line.erase(std::remove(line.begin(), line.end(), '\r'), line.end());
                
                // Ожидаем формат: "Сб 20-июнь-2026 14:32"
                size_t space_pos = line.find(' ');
                if (space_pos != std::string::npos) {
                  std::string date_part = line.substr(0, space_pos);
                  std::string time_part = line.substr(space_pos + 1);
                  
                  // Обновляем тексты на дисплее через LVGL API
                  lv_label_set_text(id(Date), date_part.c_str());
                  lv_label_set_text(id(time_label), time_part.c_str());
                }
              }
            }
          }

font:
  - file: "fonts/Roboto-Regular.ttf"
    id: cyrillic_font_40
    size: 40
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~АаБбВвГгДдЕеЁёЖжЗзИиЙйКкЛлМмНнОоПпРрСсТтУуФфХхЦцЧчШшЩщЪъЫыЬьЭэЮюЯя°'
  
  - file: "fonts/Roboto-Regular.ttf"
    id: cyrillic_font_24
    size: 24
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~АаБбВвГгДдЕеЁёЖжЗзИиЙйКкЛлМмНнОоПпРрСсТтУуФфХхЦцЧчШшЩщЪъЫыЬьЭэЮюЯя°'

  - file: "fonts/Roboto-Regular.ttf"
    id: cyrillic_font_12
    size: 12
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~АаБбВвГгДдЕеЁёЖжЗзИиЙйКкЛлМмНнОоПпРрСсТтУуФфХхЦцЧчШшЩщЪъЫыЬьЭэЮюЯя°'

    
# Реле
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI для дисплея
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C для тачскрина (GT911)
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl: GPIO45

# ДИСПЛЕЙ
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    spi_id: lcd_spi
    cs_pin: GPIO39
    invert_colors: True

# ============================================
# СЕНСОР ЭКРАНА (GT911) с коррекцией ориентации
# ============================================
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: tft_display
    i2c_id: touchscreen_bus
    address: 0x5D
    # Коррекция ориентации на 180 градусов
    rotation: 180
    # Альтернативно, можно использовать mirror_x и mirror_y:
    # mirror_x: true
    # mirror_y: true
    on_touch:
      then:
        - lambda: |-
            ESP_LOGI("touch", "Touched at x=%d, y=%d", touch.x, touch.y);
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("touch", "Released");

