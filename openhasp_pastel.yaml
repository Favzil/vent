# Реле
switch:
  - platform: gpio
    name: "Реле 1"
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: "Реле 2"
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: "Реле 3"
    pin:
      number: GPIO1
      inverted: true

# Подсветка
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Подсветка"
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# SPI для дисплея
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C для тачскрина (GT911)
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl: GPIO45

# ДИСПЛЕЙ
display:
  - platform: mipi_rgb
    id: tft_display
    model: GUITION-4848S040
    spi_id: lcd_spi
    cs_pin: GPIO39
    invert_colors: False

# СЕНСОР ЭКРАНА (GT911)
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: tft_display
    i2c_id: touchscreen_bus
    address: 0x5D
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - lambda: |-
            ESP_LOGI("touch", "Touched at x=%d, y=%d", touch.x, touch.y);
        - if:
            condition:
              lambda: 'return id(screensaver_active);'
            then:
              - lambda: |-
                  ESP_LOGI("touch", "Waking up from screensaver");
                  id(screensaver_active) = false;
                  id(inactivity_timer) = 0;
                  id(wakeup_block) = 5;
                  lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
                  if (main_page != nullptr) {
                    lv_scr_load(main_page);
                    lv_refr_now(nullptr);
                  }
            else:
              - lambda: |-
                  ESP_LOGI("touch", "Resetting inactivity timer");
                  id(inactivity_timer) = 0;
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("touch", "Released");

# ★ LVGL С КРАСИВЫМ ОФОРМЛЕНИЕМ ★
lvgl:
  id: lvgl_component
  displays:
    - tft_display
  touchscreens:
    - my_touchscreen
  rotation: 180
  
  # Оптимизация для мгновенного переключения
  buffer_size: 100%  # Полный буфер для максимальной скорости
  disp_buf_1:
    size: 100%
  
  pages:
    # ========== СТРАНИЦА ЗАСТАВКИ ==========
    - id: screensaver_page
      bg_color: 0x000000
      bg_opa: 100%
      pad_all: 0
      widgets:
        - obj:
            id: black_background
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
        
        - image:
            id: screensaver_image
            x: 0
            y: 0
            width: 480
            height: 480
            src: background_image
            align: CENTER
            opa: 0%
        
        - label:
            id: screensaver_hint
            x: 0
            y: 450
            width: 480
            height: 30
            text: "Нажмите для выхода"
            text_color: 0x333333
            text_align: CENTER
            text_font: cyrillic_font_12
            opa: 50%
        
        - button:
            id: wakeup_button
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x000000
            bg_opa: 0%
            border_width: 0
            shadow_width: 0
            on_click:
              then:
                - lambda: |-
                    ESP_LOGI("wakeup", "Wakeup button clicked!");
                - if:
                    condition:
                      lambda: 'return id(screensaver_active);'
                    then:
                      - lambda: |-
                          ESP_LOGI("wakeup", "Waking up from screensaver via button");
                          id(screensaver_active) = false;
                          id(inactivity_timer) = 0;
                          id(wakeup_block) = 5;
                          lv_obj_t *main_page = lv_obj_get_parent(id(mode_display));
                          if (main_page != nullptr) {
                            lv_scr_load(main_page);
                            lv_refr_now(nullptr);
                          }

